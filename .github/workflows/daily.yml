name: Developer OS Daily Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Update status
        run: |
          echo "Last update: $(date)" > status.txt

      - name: Commit changes
        run: |
          git config --global user.name "ak47kavan"
          git config  --global user.email "124173523+ak47kavan@users.noreply.github.com"

          git add .
	  git diff --cached --quiet && exit 0
          git commit -m "Daily Developer OS Update"
          git push
